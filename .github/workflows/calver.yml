name: Update_CalVer_Amend

on:
  push:
    branches:
      - 'main'
    paths:
      - 'subgen/__init__.py'
  workflow_dispatch:

jobs:
  calver:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          COMMIT_COUNT=$(git rev-list --count HEAD --since="$YEAR-$MONTH-01")
          echo "COMMIT_COUNT=$COMMIT_COUNT"
          echo "VERSION=${YEAR}.${MONTH}.${COMMIT_COUNT}" >> $GITHUB_ENV

      - name: Update subgen/__init__.py with version
        run: |
          sed -i "s/subgen_version =.*/subgen_version = '${{ env.VERSION }}'/" subgen/__init__.py

      - name: Check if subgen/__init__.py was actually changed
        id: check_change
        run: |
          if git diff --quiet HEAD subgen/__init__.py; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Amend commit if subgen/__init__.py changed
        if: steps.check_change.outputs.changed == 'true'
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          git config user.name "${GIT_AUTHOR_NAME}"
          git config user.email "${GIT_AUTHOR_EMAIL}"

          git add subgen/__init__.py
          git commit --amend --reuse-message=HEAD --author="${GIT_AUTHOR_NAME} <${GIT_AUTHOR_EMAIL}>"

          git push --force-with-lease origin HEAD:main
