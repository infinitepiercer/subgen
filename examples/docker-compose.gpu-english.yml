# =============================================================================
# Subgen — GPU + English-Primary
# =============================================================================
# Best for: English media libraries (Plex, Jellyfin, Bazarr).
# Whisper is locked to English so it won't hallucinate random languages
# during silent sections. The subtitle filter catches any remaining junk.
#
# If non-English audio comes through Bazarr, transcribe_and_translate will
# still translate it to English via argostranslate.
# =============================================================================

services:
  subgen:
    container_name: subgen
    image: ghcr.io/regix1/subgen:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./models:/subgen/models:rw       # persist downloaded models
      - /path/to/media:/media:rw         # match your media server paths
    environment:
      # --- GPU ---
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

      # --- Whisper Engine ---
      TRANSCRIBE_DEVICE: cuda
      COMPUTE_TYPE: float16              # float16 for GPU, int8 for less VRAM
      WHISPER_MODEL: large-v3-turbo      # fast + accurate; use "medium" for less VRAM
      WHISPER_THREADS: 4
      CONCURRENT_TRANSCRIPTIONS: 1       # 1 for single GPU, increase with more VRAM
      MODEL_PATH: /subgen/models
      NORMALIZE_AUDIO: "true"            # EBU R128 normalization for quiet/uneven audio

      # --- Anti-Hallucination ---
      # Layered defense against Whisper generating fake text during silence.
      #
      # SUBGEN_KWARGS enables built-in protections in stable-ts and faster-whisper:
      #   vad=true                          Silero VAD masks silence before Whisper sees it
      #   hallucination_silence_threshold=2 Score-based detection of hallucinated segments
      #   condition_on_previous_text=false   Prevent one hallucination from cascading forward
      #   no_speech_threshold=0.2           Aggressively mark low-confidence segments as silence
      SUBGEN_KWARGS: "{'vad': True, 'hallucination_silence_threshold': 2, 'condition_on_previous_text': False, 'no_speech_threshold': 0.2}"

      # Post-processing filter catches anything that slips through:
      # known phrases ("Thanks for watching"), gibberish, ghost words, CJK in English results.
      FILTER_SUBTITLES: "true"

      # --- Transcription Mode ---
      # transcribe_and_translate: Whisper transcribes first, then argostranslate
      # handles any non-English segments. Better quality than Whisper's built-in translate.
      TRANSCRIBE_OR_TRANSLATE: transcribe_and_translate
      TRANSLATE_SOURCE_LANGUAGES: fr,es,de,it,pt,ja,ko,zh,ru
      DETECT_CONFIDENCE_THRESHOLD: "0.7"

      # --- Language ---
      # Force English to prevent Whisper from guessing random languages during silence.
      # Remove this line if your library is primarily non-English.
      FORCE_DETECTED_LANGUAGE_TO: en

      # --- Subtitle Output ---
      SUBTITLE_LANGUAGE_NAME: en
      SUBTITLE_LANGUAGE_NAMING_TYPE: ISO_639_1
      CUSTOM_REGROUP: cm_sp=.* /。/?/？_sg=.5_sl=84_sl=42++++++1

      # --- Resource Management ---
      CLEAR_VRAM_ON_COMPLETE: "true"     # free GPU memory when idle
      MODEL_CLEANUP_DELAY: 60            # seconds to wait before unloading model

      # --- Speaker Diarization ---
      # ENABLE_DIARIZATION: "false"
      # DIARIZATION_MODEL: english

      # --- Server ---
      WEBHOOK_PORT: 9000
      DEBUG: "false"
